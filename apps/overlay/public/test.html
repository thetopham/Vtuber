<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overlay Test Controls</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
      button { margin-right: .5rem; margin-bottom: .5rem; }
      code { background: #f0f0f0; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>VTuber Overlay Test Page</h1>
    <p>Controller API URL: <code id="api">http://localhost:8787</code></p>
    <button onclick="post('/api/subtitle',{subtitle:'Testing subtitle from /test.html'})">Set subtitle</button>
    <button onclick="post('/api/speaking',{speaking:true})">Speaking on</button>
    <button onclick="post('/api/speaking',{speaking:false})">Speaking off</button>
    <button onclick="post('/api/emotion',{emotion:'happy'})">Happy</button>
    <button onclick="post('/api/emotion',{emotion:'thinking'})">Thinking</button>
    <button onclick="post('/api/status',{status:'Live test mode'})">Set status</button>
    <button onclick="post('/api/test-sequence',{})">Run demo sequence</button>
    <pre id="result"></pre>
    <script>
      async function post(path, body) {
        const base = 'http://localhost:8787';
        const res = await fetch(base + path, {
          method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
        });
        document.getElementById('result').textContent = JSON.stringify(await res.json(), null, 2);
      }
    </script>
  </body>
</html>
